name: Check Changeset

on:
  pull_request:
    branches: [main]

jobs:
  check-changeset:
    # Skip bot PRs (e.g. dependabot, changeset bot, renovate) and the
    # Changesets release PR, whose branch consumes (deletes) the changeset
    # files — the check counts only added/modified files, so it would always
    # fail on that PR even though it is the release itself.
    if: ${{ github.event.pull_request.user.type != 'Bot' && github.head_ref != 'changeset-release/main' }}
    uses: perimetre/actions/.github/workflows/check-directory-files-changed.yml@master
    with:
      directoryPath: '.changeset'
      ignoreFiles: 'README.md,config.json'
      failMessage: >-
        No changeset found. Please run `pnpm changeset` to add a changeset describing your changes.
        If this PR does not require a release, run `pnpm changeset --empty` to add an empty changeset.
